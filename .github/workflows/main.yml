name: Sync Veda Labs Model to Hugging Face

on:
  push:
    branches:
      - main  # जब भी आप main ब्रांच में कुछ पुश करेंगे, यह अपने आप चल जाएगा
  workflow_dispatch:  # आप इसे गिटहब एक्शंस टैब से मैन्युअल रूप से भी चला सकते हैं

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true  # मॉडल की बड़ी फ़ाइलों (Safetensors/Bin) के लिए यह अनिवार्य है

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Hugging Face Hub
        run: pip install -U huggingface_hub

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # यह कमांड रिपॉजिटरी की सभी फाइलों को Hugging Face पर अपलोड कर देगा
          huggingface-cli upload Veda-Labs/Vedika-4.1-flash ./ . --repo-type model --token $HF_TOKEN
