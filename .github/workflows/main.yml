name: Sync to Hugging Face
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "bot@github.com"
          git config --global user.name "GitHub Action"
          
          # 1. अगर कोई समस्या वाली इमेजेज या बड़ी फाइल्स हटानी हों (इसे आप अपनी जरूरत के अनुसार बदल सकते हैं)
          rm -rf docs/images/
          
          # 2. एक बिल्कुल नई ब्रांच (hf-deploy) बनाएं, जिसमें कोई पुरानी हिस्ट्री न हो
          git checkout --orphan hf-deploy
          
          # 3. सिर्फ मौजूदा साफ फाइलों को जोड़ें
          git add .
          git commit -m "Clean deploy Veda-Labs/Vedika-4.1-flash to Hugging Face without LFS history"
          
          # 4. इस साफ ब्रांच को हगिंग फेस के main पर जबरदस्ती (force) डाल दें
          # ध्यान दें: मॉडल के लिए लिंक में '/spaces/' नहीं लगता है।
          git push -f https://oauth2:$HF_TOKEN@huggingface.co/Veda-Labs/Vedika-4.1-flash hf-deploy:main
